<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Collision Course Studios. Send us a message or find us on Discord, Instagram, YouTube, and TikTok.">

    <title>Contact Collision Course Studios</title>

    <link rel="stylesheet" href="Styles/style.css">
    <link rel="stylesheet" href="Styles/mobile.css">
    <link rel="stylesheet" href="Styles/contact.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <script src="Scripts/menu.js" defer></script>
    <script src="Scripts/contact.js" defer></script>

    <link rel="icon" href="/Images/favicon.png" type="image/x-icon">

    <meta property="og:title" content="Collision Course Studios">
    <meta property="og:description" content="Arcade racing games built for everyone.">
    <meta property="og:image" content="https://mm-13.github.io/CollisionCourseStudios/Images/Logo_Final.png">
    <meta property="og:url" content="https://mm-13.github.io/CollisionCourseStudios">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="canonical" href="https://mm-13.github.io/CollisionCourseStudios/">
</head>
<body>
    <header class="oswald-header">
        <a href="https://mm-13.github.io/CollisionCourseStudios"><img src="Images/Logo_Final.png" alt="Collision Course Studios — Arcade Racing Game Developer" class="logo"></a>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav">
            <ul class="right">
                <li><a href="https://mm-13.github.io/CollisionCourseStudios">HOME</a></li>
                <li><a href="https://mm-13.github.io/CollisionCourseStudios/#games">GAMES</a></li>
                <li><a href="https://mm-13.github.io/CollisionCourseStudios/#about">ABOUT US</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <div class="banner-inner">
                <h2>CONTACT US & FOLLOW OUR SOCIALS</h2>
                <p>If you have any questions or feedback, feel free to reach out to us!</p>
                
                <div class="contact-form">
                    <input type="text" id="name" placeholder="Your Name" required>
                    <input type="email" id="email" placeholder="Your Email" required>
                    <input type="text" id="subject" placeholder="Subject" required>
                    <textarea id="message" rows="6" placeholder="Your message..." required></textarea>
                    <button onclick="sendMail()">Send Message</button>
                </div>

                <p>Or if you just want to say hi, follow our socials and join our Discord Community!</p>

                <div class="social-icons">
                    <a href="mailto:contact.collisioncourse@protonmail.com">
                        <img src="Images/Email_Logo.png" alt="Collision Course Studios Email" class="socials">
                    </a>
                    <a href="https://discord.gg/723cwTkYBN" target="_blank" rel="noopener noreferrer">
                        <img src="Images/Discord_Logo.png" alt="Collision Course Studios Discord" class="socials">
                    </a>
                    <a href="https://www.instagram.com/collisioncourse.studio/" target="_blank" rel="noopener noreferrer">
                        <img src="Images/Instagram_Logo.png" alt="Collision Course Studios Instagram" class="socials">
                    </a>
                    <a href="https://www.youtube.com/channel/UC3tpfQJxaKZ7xBMjQR5jR6A" target="_blank" rel="noopener noreferrer">
                        <img src="Images/YouTube_Logo.png" alt="Collision Course Studios YouTube" class="socials">
                    </a>
                    <a href="https://www.tiktok.com/@collisioncourse.studio" target="_blank" rel="noopener noreferrer">
                        <img src="Images/TikTok_Logo.png" alt="Collision Course Studios TikTok" class="socials">
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Collision Course Studios. All rights reserved.</p>
    </footer>
</body>
</html>
